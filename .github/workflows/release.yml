name: Build and Release DEB

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev python3 python3-pyqt5 fluidsynth fluid-soundfont-gm

      - name: Build DEB
        run: |
          dpkg-deb --build packaging/deb typetomusic.deb

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: typetomusic.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
