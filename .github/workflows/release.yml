name: Build and Release DEB

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev python3 python3-pyqt5 fluidsynth fluid-soundfont-gm

      - name: Build DEB
        run: |
          chmod 755 packaging/deb/DEBIAN/postinst
          dpkg-deb --build packaging/deb typetomusic.deb

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: typetomusic.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
